<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="stylesheet" href="theme.css">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Dashboard — Today for Barobogi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      /* Light Mode */
      --bg-primary: #FFFFFF;
      --bg-secondary: #F9FAFB;
      --text-primary: #111827;
      --text-secondary: #6B7280;
      --text-tertiary: #9CA3AF;
      --border: #E5E7EB;
      --accent: #5B8DEE;
      --accent-light: #EBF0FF;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.1);
    }

    html[data-theme="dark"] {
      --bg-primary: #0F1117;
      --bg-secondary: #161B22;
      --text-primary: #E6EDF3;
      --text-secondary: #8B949E;
      --text-tertiary: #6E7681;
      --border: #30363D;
      --accent: #79C0FF;
      --accent-light: #1F6FEB;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.5);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .nav-active {
      color: var(--text-primary);
      border-bottom: 2px solid var(--accent);
      padding-bottom: 2px;
    }

    a:focus-visible, button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .dark-mode-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background-color 0.2s ease;
      color: var(--text-primary);
    }

    .dark-mode-toggle:hover {
      background-color: var(--bg-secondary);
    }

    .dashboard-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 60px);
    }

    .dashboard-iframe {
      flex: 1;
      border: none;
      width: 100%;
      min-height: 600px;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col" style="background-color: var(--bg-primary); color: var(--text-primary);">

    <!-- HEADER -->
  <header class="w-full border-b" style="background-color: var(--bg-primary); border-color: var(--border); height:60px;">
    <div class="max-w-4xl mx-auto px-6 h-full flex justify-between items-center">
      <a href="index.html" class="text-base font-bold tracking-tight transition-colors duration-200" style="color: var(--text-primary);">
        Today for <span style="color: var(--accent);">Barobogi</span>
      </a>
      <div class="flex gap-4 items-center">
        <nav class="flex gap-8 text-sm" style="color: var(--text-secondary);">
          <a href="index.html" id="nav-home" class="hover:text-[var(--text-primary)] transition-colors duration-200 pb-[2px]">Home</a>
          <a href="logs.html" id="nav-logs" class="hover:text-[var(--text-primary)] transition-colors duration-200 pb-[2px]">Logs</a>
          <a href="ai-study.html" id="nav-aistudy" class="hover:text-[var(--text-primary)] transition-colors duration-200 pb-[2px]">AI Study</a>
          <a href="study-dashboard.html" id="nav-studyboard" class="hover:text-[var(--text-primary)] transition-colors duration-200 pb-[2px]">Study Board</a>
          <a href="stock-dashboard.html" id="nav-stock" class="nav-active hover:text-[var(--text-primary)] transition-colors duration-200 pb-[2px]">Stock</a>
          <a href="stats.html" id="nav-stats" class="hover:text-[var(--text-primary)] transition-colors duration-200 pb-[2px]">Stats</a>
          <a href="goals.html" id="nav-goals" class="hover:text-[var(--text-primary)] transition-colors duration-200 pb-[2px]">Goals</a>
          <a href="information.html" id="nav-multimedia" class="hover:text-[var(--text-primary)] transition-colors duration-200 pb-[2px]">Multimedia</a>
        </nav>
        <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle dark mode">🌙</button>
      </div>
    </div>
  </header>

  <!-- DASHBOARD CONTAINER -->
  <div class="dashboard-container">
    <iframe
      class="dashboard-iframe"
      src="https://barobogi.github.io/stock_dashboard/stock-dashboard.html"
      title="Stock Dashboard"
      loading="lazy">
    </iframe>
  </div>

  <!-- FOOTER -->
  <footer class="w-full border-t" style="background-color: var(--bg-secondary); border-color: var(--border);">
    <div class="max-w-7xl mx-auto px-6 py-10 flex flex-col sm:flex-row justify-between items-center gap-4 text-xs" style="color: var(--text-tertiary);">
      <div>
        <p class="font-semibold mb-1" style="color: var(--text-secondary);">CONTACT</p>
        <p>hello@barobogi.me</p>
      </div>
      <div class="text-center sm:text-right">
        <p class="mb-1">Inspired by cher1shRXD & Lee Boa</p>
        <p>&copy; 2026 Barobogi. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script>
    // Dark Mode Toggle
    function initDarkMode() {
      const toggle = document.getElementById('darkModeToggle');
      const html = document.documentElement;

      // Load saved preference or detect system preference
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const isDark = saved ? saved === 'dark' : prefersDark;

      // Set initial theme
      setTheme(isDark ? 'dark' : 'light');

      // Toggle button click
      toggle.addEventListener('click', () => {
        const current = html.getAttribute('data-theme');
        const newTheme = current === 'dark' ? 'light' : 'dark';
        setTheme(newTheme);
      });

      // Listen for system preference changes
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        if (!localStorage.getItem('theme')) {
          setTheme(e.matches ? 'dark' : 'light');
        }
      });
    }

    function setTheme(theme) {
      const html = document.documentElement;
      html.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      updateToggleIcon(theme);
    }

    function updateToggleIcon(theme) {
      const toggle = document.getElementById('darkModeToggle');
      if (toggle) {
        toggle.textContent = theme === 'dark' ? '☀️' : '🌙';
      }
    }

    // Initialize on page load
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initDarkMode);
    } else {
      initDarkMode();
    }
  </script>

</body>
</html>
